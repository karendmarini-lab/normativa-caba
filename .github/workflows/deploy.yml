name: Deploy to GCP

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '*.png'
      - '.gitignore'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: |
          gcloud compute ssh juanwisznia@edificia-server \
            --zone=us-west1-a \
            --project=edificia-prod \
            --ssh-key-expire-after=60s \
            --command="
              cd /home/juanwisznia/edificia &&
              git fetch origin main &&
              git reset --hard origin/main &&
              sudo systemctl restart edificia
            "

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -sf --max-time 15 http://136.109.202.124:8765/api/health || echo 'FAIL')
          if [ "$STATUS" = "FAIL" ]; then
            echo "::error::Health check failed"
            gcloud compute ssh juanwisznia@edificia-server \
              --zone=us-west1-a \
              --project=edificia-prod \
              --ssh-key-expire-after=60s \
              --command="sudo journalctl -u edificia --no-pager -n 30"
            exit 1
          fi
          echo "Health check passed: $STATUS"
